name: Forward Approved Feedback to Private Repo

# Triggered when the repo owner adds the 'approved' label to a user-submitted
# feedback issue. Creates a corresponding issue in the private dev repo and
# assigns it to the Copilot coding agent to implement. The agent will open a
# PR that the owner must review and approve before merging.

on:
  issues:
    types: [labeled]

jobs:
  forward:
    # Only run when the label just added is 'approved'
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    permissions:
      issues: write   # to comment & label on the public repo issue

    steps:
      - name: Forward issue to private repo & notify
        uses: actions/github-script@v7
        env:
          GH_PRIVATE_TOKEN: ${{ secrets.GH_PRIVATE_ISSUES_TOKEN }}
        with:
          script: |
            const issue = context.payload.issue;

            // Determine type: feature-request or bug
            const isFeature = issue.labels.some(
              l => l.name === 'feature-request' || l.name === 'enhancement'
            );
            const privateLabels = [isFeature ? 'enhancement' : 'bug'];

            const privateBody = [
              '## 👤 Forwarded User Feedback',
              '',
              `**Original public issue:** ${issue.html_url}`,
              `**Submitted:** ${issue.created_at}`,
              '',
              '---',
              '',
              issue.body ?? '_(no description provided)_',
              '',
              '---',
              '',
              '### Instructions for Copilot',
              '1. Review the feedback/bug report above.',
              '2. Implement a fix or the requested feature.',
              '3. Ensure changes do not break existing game mechanics.',
              '4. Run `npm test` to verify. Add regression tests where appropriate.',
            ].join('\n');

            // Create issue in private repo
            const resp = await fetch(
              'https://api.github.com/repos/joagwa/AeonsIdle/issues',
              {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${process.env.GH_PRIVATE_TOKEN}`,
                  Accept: 'application/vnd.github+json',
                  'Content-Type': 'application/json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
                body: JSON.stringify({
                  title: `[User Feedback] ${issue.title}`,
                  body: privateBody,
                  labels: privateLabels,
                }),
              }
            );

            if (!resp.ok) {
              const text = await resp.text();
              core.setFailed(`Failed to create private issue: ${resp.status} ${text}`);
              return;
            }

            const privateIssue = await resp.json();

            // Assign to Copilot cloud agent.
            // Requires Cloud Agent to be enabled in the private repo settings (Settings → Copilot → Cloud Agent).
            // Must use "copilot-swe-agent[bot]" as the assignee name + agent_assignment body.
            const assignResp = await fetch(
              `https://api.github.com/repos/joagwa/AeonsIdle/issues/${privateIssue.number}/assignees`,
              {
                method: 'POST',
                headers: {
                  Authorization: `Bearer ${process.env.GH_PRIVATE_TOKEN}`,
                  Accept: 'application/vnd.github+json',
                  'Content-Type': 'application/json',
                  'X-GitHub-Api-Version': '2022-11-28',
                },
                body: JSON.stringify({
                  assignees: ['copilot-swe-agent[bot]'],
                  agent_assignment: {
                    target_repo: 'joagwa/AeonsIdle',
                    base_branch: 'develop',
                    custom_instructions: [
                      'Review the feedback/bug report and implement a fix or the requested feature.',
                      'Ensure changes do not break existing game mechanics.',
                      'Run `npm test` to verify. Add regression tests where appropriate.',
                      'Branch from `develop` and target `develop` in your pull request.',
                    ].join(' '),
                    custom_agent: '',
                    model: '',
                  },
                }),
              }
            );
            const assignData = await assignResp.json();
            const copilotAssigned = assignData.assignees?.some(a => a.login === 'Copilot');
            core.info(`Copilot assignee result: ${assignResp.status}, assigned=${copilotAssigned}`);

            // Comment on the public issue to let the reporter know
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '✅ **This feedback has been approved by the development team!**',
                '',
                'It has been added to the development backlog and will be worked on.',
                'Thank you for your contribution to **Aeons: The Grand Unfolding** 🌌',
              ].join('\n'),
            });

            // Add 'accepted' label to the public issue
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: ['accepted'],
            });
